name: SauceDemoAIAutomation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-tests:
    name: Build and Execute Regression Priority Tests
    runs-on: ubuntu-latest

    env:
      HEADLESS_MODE: "true"
      DISPLAY: ":99"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify Maven
        run: mvn -version

      - name: Install Chrome, ChromeDriver and XVFB
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium chromium-driver xvfb
          which chromium
          which chromedriver
          chromium --version
          chromedriver --version

      - name: Start Virtual Display
        run: |
          sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &

      - name: Build Maven Project
        working-directory: SauceDemoAIAutomation
        run: mvn clean compile

      - name: Execute Regression Priority TestNG Suite
        working-directory: SauceDemoAIAutomation
        run: |
          mvn clean test -Dsurefire.suiteXmlFiles=testng-regression-priority.xml

      - name: Upload Surefire TestNG Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-testng-report
          path: SauceDemoAIAutomation/target/surefire-reports

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: SauceDemoAIAutomation/ExtentReport/extent.html
