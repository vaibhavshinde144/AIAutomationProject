name: SauceDemoAIAutomation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-tests:
    name: Build and Execute Regression Priority Tests
    runs-on: ubuntu-latest

    env:
      HEADLESS_MODE: "true"
      DISPLAY: ":99"
      SE_CACHE_PATH: "${{ runner.temp }}//something
        run: echo "$SOME_PATH"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify Maven
        run: mvn -version

      - name: Set Up Chrome and ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Configure Browser Paths
        run: |
          echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> "$GITHUB_ENV"
          echo "$(dirname '${{ steps.setup-chrome.outputs.chromedriver-path }}')" >> "$GITHUB_PATH"
          "${{ steps.setup-chrome.outputs.chrome-path }}" --version
          "${{ steps.setup-chrome.outputs.chromedriver-path }}" --version

      - name: Start Virtual Display
        run: |
          sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &

      - name: Build Maven Project
        working-directory: SauceDemoAIAutomation
        run: |
          export JAVA_TOOL_OPTIONS="-Dwebdriver.chrome.driver=${CHROMEDRIVER_PATH} -Dwebdriver.chrome.bin=${CHROME_BIN}"
          mvn -B clean compile \
            -Dwebdriver.chrome.driver="${CHROMEDRIVER_PATH}" \
            -Dwebdriver.chrome.bin="${CHROME_BIN}"

      - name: Execute Regression Priority TestNG Suite
        working-directory: SauceDemoAIAutomation
        run: |
          export JAVA_TOOL_OPTIONS="-Dwebdriver.chrome.driver=${CHROMEDRIVER_PATH} -Dwebdriver.chrome.bin=${CHROME_BIN}"
          mvn -B clean test \
            -Dsurefire.suiteXmlFiles=testng-regression-priority.xml \
            -Dwebdriver.chrome.driver="${CHROMEDRIVER_PATH}" \
            -Dwebdriver.chrome.bin="${CHROME_BIN}"

      - name: Upload Surefire TestNG Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-testng-report
          path: SauceDemoAIAutomation/target/surefire-reports

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: SauceDemoAIAutomation/ExtentReport/extent.html
