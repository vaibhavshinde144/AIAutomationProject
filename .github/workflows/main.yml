name: SauceDemoAIAutomation

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

jobs:
  run-tests:
    name: Build and Execute Automation Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      HEADLESS_MODE: "true"
      DISPLAY: ":99"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Install Chrome, ChromeDriver & XVFB
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver xvfb
          # Verify ChromeDriver installation
          which chromedriver
          chromedriver --version

      - name: Start Virtual Display
        run: |
          sudo Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &

      - name: Build Maven Project
        working-directory: SauceDemoAIAutomation
        run: mvn clean compile

      - name: Execute TestNG Tests
        working-directory: SauceDemoAIAutomation
        env:
          PATH: /usr/lib/chromium-browser:$PATH
        run: mvn test --fail-at-end

      - name: Upload Cucumber Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: SauceDemoAIAutomation/target/surefire-reports

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: SauceDemoAIAutomation/ExtentReport/extent.html
